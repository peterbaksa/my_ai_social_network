<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Social Network</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #1a1a2e;
            border-bottom: 1px solid #16213e;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 20px;
            color: #a78bfa;
        }

        #status {
            font-size: 13px;
            color: #888;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.85; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        #btn-start {
            background: #a78bfa;
            color: #0f0f0f;
        }

        #btn-resume {
            background: #38bdf8;
            color: #0f0f0f;
        }

        #btn-stop {
            background: #ef4444;
            color: white;
        }

        #feed {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .iteration-marker {
            text-align: center;
            color: #555;
            font-size: 12px;
            padding: 8px 0;
            border-top: 1px solid #222;
            margin-top: 4px;
        }

        .post {
            background: #1a1a2e;
            border-radius: 10px;
            padding: 14px 18px;
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
            border-left: 3px solid #333;
        }

        .post.action-post { border-left-color: #a78bfa; }
        .post.action-comment { border-left-color: #38bdf8; }
        .post.action-like { border-left-color: #fbbf24; }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .agent-name {
            font-weight: 600;
            font-size: 14px;
        }

        .post-meta {
            font-size: 11px;
            color: #666;
        }

        .post-target {
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
        }

        .post-content {
            font-size: 14px;
            line-height: 1.5;
            color: #ccc;
        }

        .thinking {
            text-align: center;
            color: #a78bfa;
            font-size: 13px;
            padding: 8px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        footer {
            background: #1a1a2e;
            border-top: 1px solid #16213e;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #666;
        }

        /* Agent color coding */
        .agent-marcus_webb { color: #ef4444; }
        .agent-elena_novak { color: #38bdf8; }
        .agent-dr_raj_singh { color: #34d399; }
        .agent-kira_tanaka { color: #fbbf24; }
        .agent-dave_cooper { color: #c084fc; }
    </style>
</head>
<body>
    <header>
        <h1>AI Social Network</h1>
        <span id="status">Disconnected</span>
        <div class="controls">
            <button id="btn-start" disabled>New Simulation</button>
            <button id="btn-resume" disabled>Resume Last</button>
            <button id="btn-stop" disabled>Stop</button>
        </div>
    </header>

    <div id="feed"></div>

    <footer>
        <span id="stats">Posts: 0 | Comments: 0 | Likes: 0</span>
        <span id="iteration-info">Waiting...</span>
    </footer>

    <script>
        const feed = document.getElementById('feed');
        const status = document.getElementById('status');
        const stats = document.getElementById('stats');
        const iterInfo = document.getElementById('iteration-info');
        const btnStart = document.getElementById('btn-start');
        const btnResume = document.getElementById('btn-resume');
        const btnStop = document.getElementById('btn-stop');

        let ws;
        let counts = { post: 0, comment: 0, like: 0 };
        let currentStreamEl = null;

        const agentColors = {
            'Marcus Webb': 'agent-marcus_webb',
            'Elena Novak': 'agent-elena_novak',
            'Dr. Raj Singh': 'agent-dr_raj_singh',
            'Kira Tanaka': 'agent-kira_tanaka',
            'Dave Cooper': 'agent-dave_cooper',
        };

        function connect() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${location.host}/ws`);

            ws.onopen = () => {
                status.textContent = 'Connected';
                status.style.color = '#34d399';
                btnStart.disabled = false;
                btnResume.disabled = false;
            };

            ws.onclose = () => {
                status.textContent = 'Disconnected';
                status.style.color = '#ef4444';
                btnStart.disabled = true;
                btnResume.disabled = true;
                btnStop.disabled = true;
                setTimeout(connect, 2000);
            };

            ws.onmessage = (e) => handleEvent(JSON.parse(e.data));
        }

        function handleEvent(event) {
            switch (event.type) {
                case 'simulation_start':
                    btnStart.disabled = true;
                    btnResume.disabled = true;
                    btnStop.disabled = false;
                    status.textContent = 'Running';
                    status.style.color = '#fbbf24';
                    break;

                case 'iteration_start':
                    iterInfo.textContent = `Iteration ${event.iteration}/${event.total}`;
                    const marker = document.createElement('div');
                    marker.className = 'iteration-marker';
                    marker.textContent = `— Iteration ${event.iteration} —`;
                    feed.appendChild(marker);
                    break;

                case 'agent_thinking':
                    // Create a streaming placeholder
                    currentStreamEl = createPostElement(event.agent, '', '', 'post');
                    currentStreamEl.querySelector('.post-content').textContent = '';
                    const thinkDot = document.createElement('span');
                    thinkDot.className = 'thinking';
                    thinkDot.textContent = '● thinking...';
                    currentStreamEl.querySelector('.post-content').appendChild(thinkDot);
                    feed.appendChild(currentStreamEl);
                    scrollToBottom();
                    break;

                case 'stream_chunk':
                    if (currentStreamEl) {
                        const contentEl = currentStreamEl.querySelector('.post-content');
                        const thinkEl = contentEl.querySelector('.thinking');
                        if (thinkEl) thinkEl.remove();
                        contentEl.textContent += event.chunk;
                        scrollToBottom();
                    }
                    break;

                case 'agent_action':
                    // Replace the streaming element with the final version
                    if (currentStreamEl) {
                        currentStreamEl.remove();
                        currentStreamEl = null;
                    }

                    if (event.action === 'ignore') break;

                    const el = createPostElement(
                        event.agent,
                        event.content,
                        event.target_agent,
                        event.action
                    );
                    feed.appendChild(el);

                    if (counts[event.action] !== undefined) {
                        counts[event.action]++;
                        stats.textContent = `Posts: ${counts.post} | Comments: ${counts.comment} | Likes: ${counts.like}`;
                    }
                    scrollToBottom();
                    break;

                case 'agent_error':
                    const errEl = document.createElement('div');
                    errEl.className = 'post';
                    errEl.innerHTML = `<div class="post-content" style="color:#ef4444;">Error: ${event.agent} — ${event.error}</div>`;
                    feed.appendChild(errEl);
                    if (currentStreamEl) {
                        currentStreamEl.remove();
                        currentStreamEl = null;
                    }
                    scrollToBottom();
                    break;

                case 'simulation_end':
                    status.textContent = 'Completed';
                    status.style.color = '#34d399';
                    btnStart.disabled = false;
                    btnResume.disabled = false;
                    btnStop.disabled = true;
                    iterInfo.textContent = 'Simulation finished';
                    break;
            }
        }

        function createPostElement(agent, content, target, action) {
            const div = document.createElement('div');
            div.className = `post action-${action}`;

            const colorClass = agentColors[agent] || '';
            let actionLabel = action;
            if (action === 'comment') actionLabel = 'replied';
            if (action === 'like') actionLabel = 'liked';

            let targetHtml = '';
            if (target && action === 'comment') {
                targetHtml = `<div class="post-target">↳ replying to ${target}</div>`;
            } else if (target && action === 'like') {
                targetHtml = `<div class="post-target">♥ liked ${target}'s post</div>`;
            }

            div.innerHTML = `
                <div class="post-header">
                    <span class="agent-name ${colorClass}">${agent}</span>
                    <span class="post-meta">${actionLabel}</span>
                </div>
                ${targetHtml}
                <div class="post-content">${content}</div>
            `;
            return div;
        }

        function scrollToBottom() {
            feed.scrollTop = feed.scrollHeight;
        }

        btnStart.addEventListener('click', () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                feed.innerHTML = '';
                counts = { post: 0, comment: 0, like: 0 };
                stats.textContent = 'Posts: 0 | Comments: 0 | Likes: 0';
                ws.send('start');
            }
        });

        btnResume.addEventListener('click', () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                feed.innerHTML = '';
                counts = { post: 0, comment: 0, like: 0 };
                stats.textContent = 'Posts: 0 | Comments: 0 | Likes: 0';
                ws.send('resume');
            }
        });

        btnStop.addEventListener('click', () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send('stop');
            }
        });

        connect();
    </script>
</body>
</html>
